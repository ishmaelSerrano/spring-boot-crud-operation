String imageName= "ismaelcontrast/spring-boot-app:$version"
docker {
    name imageName
    files "build/libs/${bootJar.archiveFileName.get()}"
    buildArgs([JAR_FILE: bootJar.archiveFileName.get()])
    tag 'DockerHub', "ismaelcontrast/spring-boot-crud-operation:$version"
}



String group = "999"
dockerRun {
    name 'spring-boot-app'
    image imageName
    ports '8888:8888'
    clean true
  //  daemonize false
   // arguments '-v', '/var/run/docker.sock:/var/run/docker.sock', '--group-add', group
}

