<div *ngIf="viewMode; else editable">
  <div *ngIf="currentBook.id">
    <h4>Tutorial</h4>
    <div>
      <label><strong>Book Name:</strong></label> {{ currentBook.bookname }}
    </div>
    <div>
      <label><strong>Author:</strong></label>
      {{ currentBook.author }}
    </div>
    <div>
      <label><strong>Price:</strong></label>
      {{ currentBook.price }}
    </div>

    <a
      class="badge badge-warning"
      routerLink="/book/{{ currentBook.id }}"
    >
      Edit
    </a>
  </div>

  <div *ngIf="!currentBook">
    <br />
    <p>Please click on a Tutorial...</p>
  </div>
</div>

<ng-template #editable>
  <div *ngIf="currentBook.id" class="edit-form">
    <h4>Tutorial</h4>
    <form>
      <div class="form-group">
        <label for="title">Title</label>
        <input
          type="text"
          class="form-control"
          id="title"
          [(ngModel)]="currentBook.bookname"
          name="title"
        />
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <input
          type="text"
          class="form-control"
          id="description"
          [(ngModel)]="currentBook.author"
          name="description"
        />
      </div>

      <div class="form-group">
        <label><strong>Status:</strong></label>
        {{ currentBook.price}}
      </div>
    </form>

    <button
      class="badge badge-primary mr-2"
      *ngIf="currentBook.price"
      (click)="updatePrice(40)"
    >
      UnPublish
    </button>
    <button
      *ngIf="!currentBook.price"
      class="badge badge-primary mr-2"
      (click)="updatePrice(15)"
    >
      Publish
    </button>

    <button class="badge badge-danger mr-2" (click)="deleteBook()">
      Delete
    </button>

    <button
      type="submit"
      class="badge badge-success mb-2"
      (click)="updateBook()"
    >
      Update
    </button>
    <p>{{ message }}</p>
  </div>

  <div *ngIf="!currentBook.id">
    <br />
    <p>Cannot access this Book...</p>
  </div>
</ng-template>
